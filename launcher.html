<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星链同城科技 · Hermes AI</title>
<style>
/* ============================================================
   Hermes USB Launcher — 深空毛玻璃主题
   ============================================================ */
:root {
  --bg: #0a0a14;
  --card-bg: rgba(18, 18, 40, 0.75);
  --border: rgba(100, 140, 255, 0.25);
  --glow: rgba(80, 120, 255, 0.4);
  --text: #e0e0f0;
  --accent: #6c8cff;
  --accent2: #40d8c0;
  --danger: #ff5c6c;
  --radius: 20px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  color: var(--text);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  user-select: none;
  -webkit-user-select: none;
}

/* ========== 星空粒子画布 ========== */
#starfield {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* ========== 主容器 ========== */
.main-container {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  padding: 40px;
}

/* ========== 毛玻璃卡片 ========== */
.glass-card {
  background: var(--card-bg);
  backdrop-filter: blur(24px) saturate(140%);
  -webkit-backdrop-filter: blur(24px) saturate(140%);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 8px 48px rgba(0,0,0,0.5), 0 0 0 1px var(--border), inset 0 1px 0 rgba(255,255,255,0.04);
  padding: 50px 60px;
  max-width: 580px;
  width: 90%;
  text-align: center;
  animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(40px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ========== Logo区 ========== */
.logo-area {
  margin-bottom: 28px;
}

.logo-icon {
  width: 72px;
  height: 72px;
  margin: 0 auto 16px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  box-shadow: 0 0 40px var(--glow);
  animation: logoPulse 3s ease-in-out infinite;
}

@keyframes logoPulse {
  0%, 100% { box-shadow: 0 0 40px var(--glow); }
  50% { box-shadow: 0 0 60px rgba(100,140,255,0.7), 0 0 100px rgba(64,216,192,0.3); }
}

.logo-title {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 2px;
  background: linear-gradient(135deg, #e0e8ff, #a0c4ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.logo-sub {
  font-size: 13px;
  color: rgba(200, 210, 240, 0.6);
  margin-top: 4px;
  letter-spacing: 3px;
}

/* ========== 状态指示灯 ========== */
.status-row {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin: 24px 0;
  font-size: 12px;
  color: rgba(200, 210, 240, 0.5);
}

.status-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 6px;
  animation: dotPulse 2s ease-in-out infinite;
}

.status-dot.online { background: #40d8c0; box-shadow: 0 0 8px #40d8c0; }
.status-dot.offline { background: #ff5c6c; box-shadow: 0 0 8px #ff5c6c; }
.status-dot.idle { background: #f0a040; box-shadow: 0 0 8px #f0a040; }

@keyframes dotPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ========== 按钮区 ========== */
.btn-group {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin: 28px 0 20px;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 16px 32px;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 1px;
  cursor: pointer;
  border: none;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
  color: #fff;
  text-decoration: none;
}

.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.25s;
}

.btn:hover::after { opacity: 1; }

/* 主按钮 */
.btn-primary {
  background: linear-gradient(135deg, #5578e8, #4080d0);
  box-shadow: 0 4px 20px rgba(80,120,255,0.3);
}
.btn-primary::after { background: linear-gradient(135deg, #6c8cff, #5098f0); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(80,120,255,0.45); }

/* 次要按钮 */
.btn-secondary {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
}
.btn-secondary:hover { background: rgba(255,255,255,0.12); transform: translateY(-1px); }

/* 强调按钮 */
.btn-accent {
  background: linear-gradient(135deg, #40d8c0, #30a090);
  box-shadow: 0 4px 20px rgba(64,216,192,0.25);
}
.btn-accent:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(64,216,192,0.4); }

.btn:active { transform: scale(0.97); }

.btn-icon { font-size: 20px; }

/* ========== 底部信息 ========== */
.footer-info {
  font-size: 11px;
  color: rgba(200, 210, 240, 0.35);
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 8px;
}

.divider { color: rgba(255,255,255,0.12); }

/* ========== 提示浮层 ========== */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(30, 30, 60, 0.9);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 28px;
  font-size: 14px;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(-8px);
}

.toast.success { border-color: #40d8c0; }
.toast.error { border-color: #ff5c6c; }

/* ========== 模态弹窗 ========== */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal-box {
  background: rgba(18,18,40,0.95); backdrop-filter: blur(20px);
  border: 1px solid var(--border); border-radius: 20px;
  padding: 36px 40px; max-width: 620px; width: 90%; max-height: 80vh;
  overflow-y: auto; color: var(--text); position: relative;
  animation: cardIn 0.4s ease;
}
.modal-box::-webkit-scrollbar{width:3px}
.modal-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.modal-close {
  position: absolute; top: 14px; right: 18px;
  background: none; border: none; color: var(--text2); font-size: 22px;
  cursor: pointer; transition: .2s;
}
.modal-close:hover{color:#fff}
.modal-box h2{font-size:20px;margin-bottom:16px;color:var(--accent)}
.modal-box h3{font-size:15px;margin:18px 0 8px;color:#fff}
.modal-box p,.modal-box li{font-size:13px;line-height:1.8;color:var(--text);margin:4px 0}
.modal-box code{
  background:rgba(255,255,255,0.08);padding:2px 8px;border-radius:4px;
  font-family:monospace;font-size:12px;color:var(--accent2);
}
.modal-box .step{
  background:rgba(255,255,255,0.03);border:1px solid var(--border);
  border-radius:10px;padding:14px 18px;margin:10px 0;
}
.modal-box .step-num{
  display:inline-block;width:24px;height:24px;border-radius:50%;
  background:var(--accent);color:#fff;text-align:center;line-height:24px;
  font-size:12px;font-weight:700;margin-right:8px;
}
.modal-box .cmd{
  background:#0a0a14;border:1px solid var(--border);border-radius:8px;
  padding:12px 16px;margin:8px 0;font-family:monospace;font-size:12px;
  color:var(--accent2);white-space:pre-wrap;word-break:break-all;
}
.modal-box .note{
  font-size:11px;color:var(--text2);padding:8px 12px;
  border-left:2px solid var(--warn);margin:8px 0;background:rgba(210,153,29,0.05);
}
.modal-box .btn-row{display:flex;gap:10px;margin-top:16px}
.modal-box .btn-sm{
  padding:8px 20px;border-radius:8px;font-size:13px;cursor:pointer;
  border:none;transition:.2s;font-weight:600;
}
.btn-sm.primary{background:var(--accent);color:#fff}
.btn-sm.primary:hover{filter:brightness(1.2)}
.btn-sm.secondary{background:rgba(255,255,255,0.06);color:var(--text);border:1px solid rgba(255,255,255,0.12)}
.btn-sm.secondary:hover{background:rgba(255,255,255,0.12)}

/* ========== 响应式 ========== */
@media (max-width: 600px) {
  .glass-card { padding: 32px 24px; }
  .btn { padding: 14px 24px; font-size: 14px; }
  .logo-title { font-size: 22px; }
  .modal-box { padding: 24px 20px; }
}
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<div class="main-container">
  <div class="glass-card">

    <!-- Logo -->
    <div class="logo-area">
      <div class="logo-icon">⚡</div>
      <div class="logo-title">Hermes AI</div>
      <div class="logo-sub">星链同城科技 · 智能助手</div>
    </div>

    <!-- 状态 -->
    <div class="status-row" id="statusRow">
      <span><span class="status-dot" id="dotHermes"></span><span id="txtHermes">Hermes</span></span>
      <span><span class="status-dot" id="dotUSB"></span>U盘</span>
      <span><span class="status-dot" id="dotNet"></span>网络</span>
    </div>

    <!-- 按钮 -->
    <div class="btn-group">
      <button class="btn btn-primary" onclick="action('install')">
        <span class="btn-icon">📦</span> 一键安装 Hermes
      </button>
      <button class="btn btn-secondary" onclick="action('launch')">
        <span class="btn-icon">🚀</span> 启动 Hermes
      </button>
      <button class="btn btn-secondary" onclick="action('config')">
        <span class="btn-icon">⚙️</span> 配置向导
      </button>
      <button class="btn btn-accent" onclick="action('docs')">
        <span class="btn-icon">📖</span> 使用教程
      </button>
    </div>

    <!-- 底部 -->
    <div class="footer-info">
      <span>v2.1.0</span>
      <span class="divider">|</span>
      <span>AI 驱动办公效率</span>
      <span class="divider">|</span>
      <span>厦门星链同城科技</span>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ══════ 模态弹窗 ══════ -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modalBox"></div>
</div>

<script>
// ============================================================
// 星空粒子动画
// ============================================================
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let particles = [];
let mouse = { x: -1000, y: -1000 };

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() {
    this.reset();
    this.y = Math.random() * canvas.height; // 初始散布
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = -10;
    this.size = Math.random() * 2.5 + 0.5;
    this.speedY = Math.random() * 0.6 + 0.2;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.opacity = Math.random() * 0.7 + 0.3;
    this.twinkleSpeed = Math.random() * 0.02 + 0.005;
    this.twinkleOffset = Math.random() * Math.PI * 2;
  }
  update() {
    this.y += this.speedY;
    this.x += this.speedX;
    // 鼠标引力
    const dx = mouse.x - this.x;
    const dy = mouse.y - this.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 150) {
      this.x += dx * 0.005;
      this.y += dy * 0.005;
    }
    if (this.y > canvas.height + 10) this.reset();
    if (this.x < -10) this.x = canvas.width + 10;
    if (this.x > canvas.width + 10) this.x = -10;
  }
  draw() {
    const twinkle = Math.sin(Date.now() * this.twinkleSpeed + this.twinkleOffset) * 0.3 + 0.7;
    const alpha = this.opacity * twinkle;
    ctx.fillStyle = `rgba(160,200,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

for (let i = 0; i < 120; i++) particles.push(new Particle());

canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  // 连线
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = dx*dx + dy*dy;
      if (dist < 12000) {
        ctx.strokeStyle = `rgba(120,160,240,${0.08 * (1 - dist/12000)})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(animate);
}
animate();

// ============================================================
// 状态检测
// ============================================================
async function checkStatus() {
  const dotHermes = document.getElementById('dotHermes');
  const txtHermes = document.getElementById('txtHermes');

  try {
    const resp = await fetch('http://127.0.0.1:18920/status', { signal: AbortSignal.timeout(2000) });
    if (resp.ok) {
      dotHermes.className = 'status-dot online';
      txtHermes.textContent = 'Hermes 运行中';
      return;
    }
  } catch(e) {}

  dotHermes.className = 'status-dot offline';
  txtHermes.textContent = 'Hermes 未启动';
}

checkStatus();
setInterval(checkStatus, 5000);

// ============================================================
// 按钮动作 — 浏览器模式有真实功能
// ============================================================
function showToast(msg, type) {
  type = type || '';
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ' + type + ' show';
  setTimeout(function(){ toast.className = 'toast'; }, 2500);
}

function openModal(html) {
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function action(type) {
  // pywebview 桌面模式
  if (window.pywebview && window.pywebview.api) {
    window.pywebview.api.handle_action(type);
    return;
  }
  // 浏览器模式 — 弹出对应内容
  switch(type) {
    case 'install': showInstallModal(); break;
    case 'launch': showLaunchModal(); break;
    case 'config': showConfigModal(); break;
    case 'docs': showDocsModal(); break;
  }
}

// ── 一键安装 ──
function showInstallModal(){
  openModal(
    '<button class="modal-close" onclick="closeModal()">&times;</button>'+
    '<h2>📦 一键安装 Hermes</h2>'+
    '<div class="step"><span class="step-num">1</span><strong>打开终端</strong>'+
    '<p>Windows: 按 <code>Win+R</code> 输入 <code>cmd</code> 回车</p></div>'+
    '<div class="step"><span class="step-num">2</span><strong>复制粘贴运行</strong>'+
    '<div class="cmd">pip install hermes-agent</div></div>'+
    '<div class="step"><span class="step-num">3</span><strong>配置API Key</strong>'+
    '<p>安装完成后运行配置向导</p></div>'+
    '<div class="note">💡 国内用户如安装慢，用阿里云镜像：<br>'+
    '<code>pip install hermes-agent -i https://mirrors.aliyun.com/pypi/simple/</code></div>'+
    '<div class="btn-row">'+
    '<button class="btn-sm primary" onclick="closeModal();action(\'config\')">去配置 →</button>'+
    '<button class="btn-sm secondary" onclick="closeModal()">关闭</button></div>'
  );
}

// ── 启动 Hermes ──
function showLaunchModal(){
  var statusHtml = '';
  checkHermesStatusQuick(function(running){
    if (running) {
      statusHtml = '<div class="note" style="border-color:var(--accent2)">✅ Hermes 已在运行中</div>'+
        '<p>浏览器打开：<code>http://localhost:18920</code></p>';
    } else {
      statusHtml = '<div class="note">⚠ Hermes 未运行，请在终端输入 <code>hermes</code> 启动</div>'+
        '<p>或打开桌面快捷方式「Hermes」</p>';
    }
    openModal(
      '<button class="modal-close" onclick="closeModal()">&times;</button>'+
      '<h2>🚀 启动 Hermes</h2>'+statusHtml+
      '<h3>启动方式</h3>'+
      '<p><strong>方式1：</strong>终端输入 <code>hermes</code> 回车</p>'+
      '<p><strong>方式2：</strong>桌面双击 Hermes 快捷方式</p>'+
      '<p><strong>方式3：</strong>Windows开始菜单搜「Hermes」</p>'+
      '<div class="btn-row">'+
      '<button class="btn-sm primary" onclick="closeModal()">知道了</button></div>'
    );
  });
}
function checkHermesStatusQuick(cb){
  try {
    var x = new XMLHttpRequest();
    x.open('GET','http://127.0.0.1:18920/status');
    x.timeout = 2000;
    x.onload = function(){ cb(x.status===200); };
    x.onerror = function(){ cb(false); };
    x.ontimeout = function(){ cb(false); };
    x.send();
  } catch(e){ cb(false); }
}

// ── 配置向导 ──
function showConfigModal(){
  openModal(
    '<button class="modal-close" onclick="closeModal()">&times;</button>'+
    '<h2>⚙️ 配置向导</h2>'+
    '<div class="step"><span class="step-num">1</span><strong>获取 DeepSeek API Key</strong>'+
    '<p>打开 <code>platform.deepseek.com</code> → 注册 → API Keys → 创建</p></div>'+
    '<div class="step"><span class="step-num">2</span><strong>运行配置命令</strong>'+
    '<div class="cmd">hermes config set model.provider deepseek\nhermes config set model.api_key sk-你的key</div></div>'+
    '<div class="step"><span class="step-num">3</span><strong>验证</strong>'+
    '<p>终端输入 <code>hermes</code>，能正常对话即配置成功</p></div>'+
    '<div class="note">💡 也支持阿里云百炼：<code>dashscope.aliyuncs.com</code><br>'+
    '模型：<code>qwen-vl-max</code> / <code>deepseek-v4-pro</code></div>'+
    '<div class="btn-row">'+
    '<button class="btn-sm primary" onclick="closeModal();action(\'launch\')">去启动 →</button>'+
    '<button class="btn-sm secondary" onclick="closeModal()">关闭</button></div>'
  );
}

// ── 使用教程 ──
function showDocsModal(){
  openModal(
    '<button class="modal-close" onclick="closeModal()">&times;</button>'+
    '<h2>📖 Hermes 使用教程</h2>'+

    '<h3>💬 基础对话</h3>'+
    '<p>终端输入 <code>hermes</code> 进入交互模式，直接打字提问。</p>'+
    '<div class="cmd">$ hermes\n> 帮我分析这个Excel表格的销售数据</div>'+

    '<h3>📊 数据分析</h3>'+
    '<p>直接把文件路径告诉它：</p>'+
    '<div class="cmd">> 读取桌面/销售数据.xlsx，按月份汇总，生成报表</div>'+

    '<h3>📝 文档生成</h3>'+
    '<p>一句话生成Word/PPT：</p>'+
    '<div class="cmd">> 写一份超市促销方案的PPT，5页</div>'+

    '<h3>🎨 图像生成</h3>'+
    '<p>描述画面即可，ComfyUI自动出图：</p>'+
    '<div class="cmd">> 生成一张超市生鲜促销海报，红色背景白字</div>'+

    '<h3>🤖 机器人管理</h3>'+
    '<p>管理小星（豹小秘MINI）：</p>'+
    '<div class="cmd">> 查看小星机器人状态\n> 更新小星的广告宣传图</div>'+

    '<h3>⌨ 快捷键</h3>'+
    '<p><code>Ctrl+C</code> 中断当前操作</p>'+
    '<p><code>↑↓</code> 历史命令</p>'+
    '<p><code>Tab</code> 自动补全路径</p>'+

    '<div class="btn-row">'+
    '<button class="btn-sm primary" onclick="closeModal();action(\'install\')">去安装 →</button>'+
    '<button class="btn-sm secondary" onclick="closeModal()">关闭</button></div>'
  );
}

// 键盘快捷键
document.addEventListener('keydown', function(e) {
  if (e.key === 'i' || e.key === 'I') action('install');
  if (e.key === 'Enter' && document.activeElement === document.body) action('launch');
  if (e.key === 'c' || e.key === 'C') action('config');
  if (e.key === 'd' || e.key === 'D') action('docs');
  if (e.key === 'Escape') closeModal();
});
</script>
</body>
</html>
